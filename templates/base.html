<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Analysis Report</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; margin: 20px; }
    h1, h2, h3 { color: #444; }
    .card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .metric { font-size: 24px; font-weight: bold; color: #d9534f; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #eee; cursor: pointer; }
    nav { margin-bottom: 20px; background: #333; padding: 10px; border-radius: 5px; }
    nav a { color: #fff; text-decoration: none; margin-right: 15px; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    .pagination a { padding: 8px 12px; background: #eee; border: 1px solid #ccc; text-decoration: none; color: #333; border-radius: 3px; }
    .pagination a:hover { background: #ddd; }
    .pagination span { padding: 8px 12px; }
</style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/lengths">Password Lengths</a>
        <a href="/shared">Shared Passwords</a>
        <a href="/lm_hashes">LM Hashes</a>
        <a href="/policy">Policy Violations</a>
        <a href="/high_value?group=all">High Value</a>
        <a href="/kerberoastable">Kerberoastable</a>
        <a href="/asreproastable">ASREPRoastable</a>
        <a href="/flags">Account Flags</a>
        <a href="/history">Password History</a>
    </nav>
    <h1>Password Analysis Report: {% block title %}{% endblock %}</h1>

    {% block content %}{% endblock %}

</body>
</html>
