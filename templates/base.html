<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Analysis Report</title>
<style>
    body { font-family: Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 20px; }
    h1, h2, h3 { color: #ffffff; }
    .card { background: #1e1e1e; padding: 20px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .metric { font-size: 24px; font-weight: bold; color: #4dabf7; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    th { background: #2c2c2c; cursor: pointer; color: #ffffff; }
    nav { margin-bottom: 20px; background: #000000; padding: 10px; border-radius: 5px; border-bottom: 2px solid #4dabf7; }
    nav a { color: #e0e0e0; text-decoration: none; margin-right: 15px; font-weight: bold; }
    nav a:hover { color: #ffffff; text-decoration: underline; }
    a { color: #4dabf7; }
    .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    .pagination a { padding: 8px 12px; background: #2c2c2c; border: 1px solid #444; text-decoration: none; color: #e0e0e0; border-radius: 3px; }
    .pagination a:hover { background: #3c3c3c; color: #ffffff; }
    .pagination span { padding: 8px 12px; color: #ffffff; }
</style>
</head>
<body>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/lengths">Password Lengths</a>
        <a href="/shared">Shared Passwords</a>
        <a href="/lm_hashes">LM Hashes</a>
        <a href="/policy">Policy Violations</a>
        <a href="/high_value?group=all">High Value</a>
        <a href="/kerberoastable">Kerberoastable</a>
        <a href="/asreproastable">ASREPRoastable</a>
        <a href="/flags">Account Flags</a>
        <a href="/history">Password History</a>
    </nav>
    <h1>Password Analysis Report: {% block title %}{% endblock %}</h1>

    {% block content %}{% endblock %}

</body>
</html>
