{% extends "base.html" %}

{% block title %}Password Lengths{% endblock %}

{% block content %}
<div class="card">
    <h2>Password Length Distribution</h2>
    <p><em>The chart has been moved to the <a href="/">Dashboard</a>.</em></p>

    <table id="lengthsTable">
        <tr>
            <th onclick="sortTable(0)" style="cursor: pointer;">Length &#x21D5;</th>
            <th onclick="sortTable(1)" style="cursor: pointer;">Count &#x21D5;</th>
        </tr>
        {% for row in lengths %}
        <tr>
            <td>{{ row.pw_length }}</td>
            <td>{{ row.count }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
function sortTable(n) {
  var table, rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
  table = document.getElementById("lengthsTable");
  switching = true;
  dir = "asc";
  while (switching) {
    switching = false;
    rows = table.rows;
    for (i = 1; i < (rows.length - 1); i++) {
      shouldSwitch = false;
      x = rows[i].getElementsByTagName("TD")[n];
      y = rows[i + 1].getElementsByTagName("TD")[n];
      var valX = parseInt(x.innerHTML);
      var valY = parseInt(y.innerHTML);
      if (dir == "asc") {
        if (valX > valY) {
          shouldSwitch = true;
          break;
        }
      } else if (dir == "desc") {
        if (valX < valY) {
          shouldSwitch = true;
          break;
        }
      }
    }
    if (shouldSwitch) {
      rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
      switching = true;
      switchcount ++;
    } else {
      if (switchcount == 0 && dir == "asc") {
        dir = "desc";
        switching = true;
      }
    }
  }
}
</script>
{% endblock %}
